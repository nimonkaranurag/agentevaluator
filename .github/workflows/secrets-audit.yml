name: secrets-audit

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  detect-secrets:
    name: detect-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dev dependencies
        run: uv sync --group dev

      - name: Verify .secrets.baseline is checked in
        run: |
          if [[ ! -f .secrets.baseline ]]; then
            echo "::error::.secrets.baseline is missing. Generate it locally with:" >&2
            echo "::error::  uv run detect-secrets scan --exclude-files '\\.venv/|node_modules/|__pycache__/|runs/|assets/' > .secrets.baseline" >&2
            exit 1
          fi

      - name: Run detect-secrets against every tracked file
        run: |
          set -euo pipefail
          # Hook exits non-zero on any NEW secret not already in the baseline,
          # or any baseline entry that no longer matches the current source.
          mapfile -t TRACKED < <(git ls-files)
          uv run detect-secrets-hook --baseline .secrets.baseline "${TRACKED[@]}"

      - name: Confirm baseline did not drift
        run: |
          # If a contributor regenerated the baseline without committing,
          # the working-tree copy will diverge from origin. Fail loudly.
          if ! git diff --exit-code .secrets.baseline; then
            echo "::error::.secrets.baseline drift detected — commit the regenerated baseline." >&2
            exit 1
          fi
